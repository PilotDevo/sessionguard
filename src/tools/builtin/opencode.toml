[tool]
name = "opencode"
display_name = "OpenCode"
version = "1.0"
# sst/opencode stores session data under ~/.local/share/opencode/ and
# respects AGENTS.md plus per-project opencode.json(c) config. Session
# data is keyed on absolute project path; home-dir reconciliation is
# v0.4 `migrate` scope, so on_move stays `notify` for now.
on_move = "notify"
binary = "opencode"

session_patterns = [
  "AGENTS.md",
  ".opencodeignore",
  "opencode.json",
  "opencode.jsonc",
]

# OpenCode stores its session database (SQLite, with WAL) at the XDG
# data location with no documented env-var or config-file override.
# For `sessionguard migrate` that's the `discovery = "symlink"` case:
# rsync the data to the new location, then leave a symlink at the
# canonical path so OpenCode opens the DB transparently. Verified
# against opencode 0.x on Linux + macOS — the daemon follows the
# symlink and writes through it without complaint.
[tool.home_dir_layout]
default_path = "~/.local/share/opencode"
discovery = "symlink"

# OpenCode keeps its session DB in SQLite with WAL enabled. Copying a
# live WAL database mid-write risks a torn copy, so when OpenCode runs
# under a systemd user service we stop it for the duration of the copy
# and restart it once the symlink is in place. The unit name below is
# the conventional one; declaring it is safe even if you *don't* run
# OpenCode under systemd — `sessionguard migrate` treats a not-loaded
# unit as benign (it warns and proceeds without quiescing). Override
# the name (or move it to `systemd_system_unit`) via a user/project
# tool config if your unit differs.
[tool.home_dir_layout.quiesce]
systemd_user_unit = "opencode.service"
