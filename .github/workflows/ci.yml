name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

  msrv:
    name: MSRV (1.85)
    # Enforce the declared minimum supported Rust version (Cargo.toml
    # rust-version / clippy.toml). Without this, an accidental use of a
    # newer std API would silently break 1.85 builds.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build
      - name: Test
        run: cargo test

  dogfood:
    name: Dogfood (${{ matrix.os }})
    # End-to-end smoke test that runs the real daemon against a synthetic
    # Claude Code project and asserts reconciliation fires. Unit tests
    # bypass the notify -> daemon pipeline and have historically missed
    # platform-specific bugs (v0.2.3 rename pairing, macOS /private
    # aliasing) — this job is the regression gate for those classes.
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --quiet

      - name: Run dogfood.sh
        env:
          SESSIONGUARD_BIN: ./target/release/sessionguard
        run: bash scripts/dogfood.sh

      - name: Run migrate-dogfood.sh
        env:
          SESSIONGUARD_BIN: ./target/release/sessionguard
        run: bash scripts/migrate-dogfood.sh

      - name: Run update-dogfood.sh
        env:
          SESSIONGUARD_BIN: ./target/release/sessionguard
        run: bash scripts/update-dogfood.sh

  deny:
    name: Cargo Deny
    # Also runs the RustSec advisory DB check ([advisories] in deny.toml),
    # so vulnerability scanning is already gated here — no separate
    # cargo-audit job needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage baseline
    # Establishes a line-coverage signal (previously unmeasured). Non-gating
    # for now — prints a summary; add `--fail-under-lines N` once we've
    # settled on a floor.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Coverage summary
        run: cargo llvm-cov --workspace --summary-only
