allow-branch = ["main"]
sign-commit = false
sign-tag = false
push = true
publish = false
tag-prefix = "v"
tag-name = "v{{version}}"
# Must stay in the `chore(release)` shape: cliff.toml skips ^chore\(release\)
# so release commits don't leak into the changelog, and all historical release
# commits use this style.
pre-release-commit-message = "chore(release): v{{version}}"
tag-message = "v{{version}}"
